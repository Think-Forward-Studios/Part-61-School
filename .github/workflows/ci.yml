name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Apply migrations
        run: pnpm --filter @part61/db exec drizzle-kit migrate

      - run: pnpm -r typecheck

      - run: pnpm -r lint

      - run: pnpm -r test

      - run: pnpm --filter web build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm --filter web exec playwright test --project=chromium-admin --project=chromium-student
        env:
          APP_URL: http://localhost:3000
          RESEND_API_KEY: test-fake-key
          RESEND_FROM_EMAIL: test@example.com
          INTERNAL_WORKER_SECRET: ci-test-secret
        continue-on-error: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
