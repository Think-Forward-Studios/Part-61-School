name: Migrate Production DB

# Manually triggered. Runs all Drizzle migrations against the production
# Supabase database using the PRODUCTION_DATABASE_URL secret.
#
# Usage:
#   1. Add PRODUCTION_DATABASE_URL to repo secrets (Session pooler URI, port 5432)
#   2. Actions tab → "Migrate Production DB" → Run workflow
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type MIGRATE to confirm you want to apply migrations to production'
        required: true
        type: string
      reset:
        description: 'Wipe public/audit/drizzle schemas first (destroys all data!)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  migrate:
    if: github.event.inputs.confirm == 'MIGRATE'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Reset DB schema (only if reset=true)
        if: github.event.inputs.reset == 'true'
        run: |
          pnpm --filter @part61/db exec node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DIRECT_DATABASE_URL, { prepare: false, max: 1 });
          (async () => {
            // Wipe everything the app created. Preserves Supabase-managed schemas.
            await sql.unsafe(\`drop schema if exists drizzle cascade;\`);
            await sql.unsafe(\`drop schema if exists audit cascade;\`);
            await sql.unsafe(\`drop schema public cascade;\`);
            await sql.unsafe(\`create schema public;\`);
            await sql.unsafe(\`grant all on schema public to postgres, anon, authenticated, service_role;\`);
            console.log('Public, audit, drizzle schemas reset.');
            await sql.end();
          })().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DIRECT_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Pre-apply non-transactional DDL (enum ADD VALUE)
        # PostgreSQL forbids using an enum value in the same transaction
        # it was added in (error 55P04 "New enum values must be committed
        # before they can be used"). drizzle-kit wraps all pending
        # migrations in a single transaction, so migration 0039
        # (ADD VALUEs) and migration 0040 (seed that USES them) would
        # fail if run together. We apply 0039's ADD VALUE and ADD COLUMN
        # statements here in autocommit mode BEFORE drizzle-kit runs.
        # Every statement is IF NOT EXISTS, so drizzle-kit will re-apply
        # 0039 as an idempotent no-op and then apply 0040 in its own tx
        # with the enum values already committed.
        #
        # This step is idempotent — safe to re-run on any database state.
        run: |
          pnpm --filter @part61/db exec node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DIRECT_DATABASE_URL, { prepare: false, max: 1 });
          const stmts = [
            \"alter type public.course_rating_sought add value if not exists 'private_pilot_asel'\",
            \"alter type public.course_rating_sought add value if not exists 'private_pilot_amel'\",
            \"alter type public.course_rating_sought add value if not exists 'private_pilot_amel_addon'\",
            \"alter type public.course_rating_sought add value if not exists 'private_pilot_rotorcraft_helicopter'\",
            \"alter type public.course_rating_sought add value if not exists 'private_pilot_glider'\",
            \"alter type public.course_rating_sought add value if not exists 'sport_pilot'\",
            \"alter type public.course_rating_sought add value if not exists 'recreational_pilot'\",
            \"alter table public.course_version add column if not exists launch_method_primary text check (launch_method_primary is null or launch_method_primary in ('aerotow','ground_launch','self_launch'))\",
            \"alter table public.course_version add column if not exists mosaic_aligned boolean\"
          ];
          (async () => {
            for (const stmt of stmts) {
              console.log('pre-apply:', stmt.slice(0, 100));
              await sql.unsafe(stmt);
            }
            console.log('pre-apply: done');
            await sql.end();
          })().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DIRECT_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Apply Drizzle migrations
        run: pnpm --filter @part61/db exec drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Verify schema
        run: |
          pnpm --filter @part61/db exec node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DIRECT_DATABASE_URL, { prepare: false, max: 1 });
          (async () => {
            const hook = await sql\`select proname from pg_proc where proname = 'custom_access_token_hook'\`;
            const migrations = await sql\`select count(*)::int as n from drizzle.__drizzle_migrations\`;
            const tables = await sql\`
              select tablename from pg_tables
              where schemaname = 'public' and tablename in ('users','user_roles','schools','bases','notification','school_rate')
              order by tablename
            \`;
            console.log('custom_access_token_hook:', hook.length > 0 ? 'PRESENT' : 'MISSING');
            console.log('migrations applied:', migrations[0].n);
            console.log('key tables:', tables.map(t => t.tablename).join(', '));
            await sql.end();
          })().catch(e => { console.error(e); process.exit(1); });
          "
        env:
          DIRECT_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
